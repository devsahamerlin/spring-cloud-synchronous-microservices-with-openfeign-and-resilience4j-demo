services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.1.4
    hostname: keycloak
    restart: on-failure
    command: ["start-dev"]
    ports:
      - "9997:9997"
    depends_on:
      postgres-kc:
        condition: service_healthy
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_USERNAME}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-kc:5432/keycloak
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_HTTP_PORT=9997
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=9997
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_FEATURES=token-exchange
    networks:
      - ${GLOBAL_NETWORK}

  postgres-kc:
    container_name: postgres-kc
    image: postgres:17-alpine
    hostname: postgres-kc
    volumes:
      - postgres_data_kc:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ${GLOBAL_NETWORK}

  pgadmin-kc:
    container_name: pgadmin-kc
    image: dpage/pgadmin4:8.14
    restart: unless-stopped
    depends_on:
      - postgres-kc
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data_kc:/var/lib/pgadmin
    ports:
      - "9998:80"
    networks:
      - ${GLOBAL_NETWORK}

volumes:
  postgres_data_kc:
    driver: local
  pgadmin_data_kc:
    driver: local